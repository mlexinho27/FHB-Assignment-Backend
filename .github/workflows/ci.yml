name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci --ignore-scripts

      - name: ESLint pruefen (Quality-Gate)
        run: npm run lint

      - name: Tests + Coverage ausfuehren
        run: npm test

      - name: Coverage-Report als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
  
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhaengigkeiten installieren
        run: npm ci --ignore-scripts

      - name: Tests + Coverage fuer Sonar erzeugen
        run: npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Quality-Gate-Ergebnis abwarten
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}