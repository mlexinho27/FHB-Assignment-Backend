name: Docker Release

on:
  push:
    branches: [ main ]

jobs:
  build-push-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Image-Namen (Kleinschreibung) vorbereiten
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Versionsnummer aus package.json lesen
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Image bauen und pushen (mit Tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.pkg.outputs.version }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest

      - name: Security-Scan des Images mit Trivy
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: ${{ steps.image.outputs.name }}:${{ steps.pkg.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          output: trivy-report.txt
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy-Report als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
